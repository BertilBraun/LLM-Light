experiment:
  name: tinystories_hf_smoke
  seed: 1337
  output_dir: runs/tinystories_hf_smoke

dataset:
  type: huggingface
  name: roneneldan/TinyStories
  text_column: text
  streaming: true
  splits:
    - source_split: train
      split: train
      max_documents: 1000
    - source_split: validation
      split: validation
      max_documents: 200

tokenizer:
  type: byte_bpe
  vocabulary_size: 1024
  add_bos_token: true
  add_eos_token: true
  add_pad_token: true

preprocessing:
  output_shard_documents: 10000
  transforms:
    - type: normalize_unicode
      form: NFC
    - type: normalize_line_endings
    - type: min_length
      min_characters: 50
    - type: max_length
      max_characters: 4096
    - type: exact_deduplication

packing:
  context_length: 128
  add_bos: true
  add_eos: true
  pack_documents: true
  maximum_shard_tokens: 1000000

model:
  type: dense_gpt
  dimension: 64
  layers: 4
  attention_heads: 4
  feed_forward_dimension: 256
  dropout: 0.05
  tie_embeddings: true

training:
  objective: causal_language_modeling
  maximum_steps: 100
  batch_size_sequences: 4
  dataloader:
    num_workers: 0
    pin_memory: false
    persistent_workers: false
    prefetch_factor: null
  optimizer:
    learning_rate: 0.0006
    weight_decay: 0.1
  precision: fp32
  gradient_clip_norm: 1.0
  checkpoint_interval_steps: 50
  log_interval_steps: 10
  evaluation:
    interval_steps: 50
    evaluators:
      perplexity:
        split: validation
        maximum_documents: 50
      fixed_prompt_generation:
        prompts:
          - "Once upon a time"
        maximum_new_tokens: 80

post_training:
  type: none

evaluation:
  perplexity:
    split: validation
    maximum_documents: 50
  fixed_prompt_generation:
    prompts:
      - "Once upon a time"
      - "The little girl found"
    maximum_new_tokens: 40

inference:
  engine: naive
  precision: fp32
  quantization: none
  maximum_new_tokens: 80

distributed:
  enabled: false
