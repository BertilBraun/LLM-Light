experiment:
  name: tinystories_local_text
  seed: 1337
  output_dir: runs/tinystories_local_text

dataset:
  type: local_text
  paths: []
  glob_patterns:
    - data/tinystories/**/*.txt

tokenizer:
  type: byte_bpe
  vocabulary_size: 1024
  max_training_documents: 1000
  max_training_bytes: 1000000
  add_bos_token: true
  add_eos_token: true
  add_pad_token: true

preprocessing:
  output_shard_documents: 10000
  transforms:
    - type: normalize_unicode
      form: NFC
    - type: normalize_line_endings
    - type: min_length
      min_characters: 50
    - type: max_length
      max_characters: 4096
    - type: exact_deduplication
    - type: assign_split
      train_probability: 0.98
      validation_probability: 0.01
      test_probability: 0.01

packing:
  context_length: 512
  add_bos: true
  add_eos: true
  pack_documents: true
  maximum_shard_tokens: 1000000

model:
  type: dense_gpt
  dimension: 64
  layers: 4
  attention_heads: 4
  feed_forward_dimension: 256
  dropout: 0.05
  tie_embeddings: true

training:
  objective: causal_language_modeling
  maximum_steps: 1000
  batch_size_sequences: 8
  dataloader:
    num_workers: 0
    pin_memory: false
    persistent_workers: false
    prefetch_factor: null
  optimizer:
    learning_rate: 0.0006
    weight_decay: 0.1
  precision: fp32
  gradient_clip_norm: 1.0
  checkpoint_interval_steps: 100
  log_interval_steps: 10
  evaluation:
    interval_steps: 50
    evaluators:
      perplexity:
        split: validation
        maximum_documents: 100
      fixed_prompt_generation:
        prompts:
          - "Once upon a time"
        maximum_new_tokens: 80

post_training:
  type: none

evaluation:
  perplexity:
    split: validation
    maximum_documents: 1000
  fixed_prompt_generation:
    prompts:
      - "Once upon a time"
      - "The little girl found"
    maximum_new_tokens: 120

inference:
  engine: naive
  precision: fp32
  quantization: none
  maximum_new_tokens: 64

distributed:
  enabled: false
