experiment:
  name: verify_local_text
  seed: 1337
  output_dir: runs/verify_local_text

dataset:
  type: local_text
  paths:
    - tests/fixtures/local_text/hello_world.txt
  glob_patterns: []

tokenizer:
  type: character
  add_bos_token: true
  add_eos_token: true
  add_pad_token: true

preprocessing:
  output_shard_documents: 1000
  transforms:
    - type: normalize_unicode
      form: NFC
    - type: normalize_line_endings
    - type: min_length
      min_characters: 1
    - type: max_length
      max_characters: 256
    - type: exact_deduplication
    - type: assign_split
      train_probability: 1.0
      validation_probability: 0.0
      test_probability: 0.0

packing:
  context_length: 13
  add_bos: true
  add_eos: true
  pack_documents: false
  maximum_shard_tokens: 1024

model:
  type: dense_gpt
  dimension: 32
  layers: 2
  attention_heads: 2
  feed_forward_dimension: 32
  dropout: 0.0
  tie_embeddings: true

training:
  objective: causal_language_modeling
  maximum_steps: 60
  batch_size_sequences: 1
  dataloader:
    num_workers: 0
    pin_memory: false
    persistent_workers: false
    prefetch_factor: null
  optimizer:
    learning_rate: 0.01
    weight_decay: 0.0
  precision: fp32
  gradient_clip_norm: 1.0
  checkpoint_interval_steps: 1
  log_interval_steps: 1
  evaluation: null

post_training:
  type: none

evaluation:
  exact_reproduction:
    prompt: ""
    expected_completion: "hello world\n"

inference:
  engine: naive
  precision: fp32
  quantization: none
  maximum_new_tokens: 20

distributed:
  enabled: false
