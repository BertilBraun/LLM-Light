experiment:
  name: python_moe_14m
  seed: 1337
  output_dir: runs/python_moe_14m

dataset:
  type: local_text
  paths: []
  glob_patterns:
    - data/python/**/*.py

tokenizer:
  type: byte_bpe
  vocabulary_size: 8192
  max_training_documents: 50000
  max_training_bytes: 50000000
  training_workers: 4
  add_bos_token: true
  add_eos_token: true
  add_pad_token: true

preprocessing:
  workers: 4
  output_shard_documents: 5000
  transforms:
    - type: normalize_unicode
      form: NFC
    - type: normalize_line_endings
    - type: min_length
      min_characters: 20
    - type: max_length
      max_characters: 20000
    - type: exact_deduplication
    - type: assign_split
      train_probability: 0.98
      validation_probability: 0.01
      test_probability: 0.01

packing:
  workers: 4
  context_length: 512
  add_bos: true
  add_eos: true
  pack_documents: false
  maximum_shard_tokens: 10000000

model:
  type: moe_gpt
  dimension: 208
  layers: 4
  attention_heads: 8
  expert_feed_forward_dimension: 832
  expert_count: 8
  router_top_k: 1
  dropout: 0.05
  tie_embeddings: true

training:
  objective: causal_language_modeling
  causal_language_modeling:
    auxiliary_loss_weight: 0.01
  maximum_steps: 50000
  batch_size_sequences: 32
  dataloader:
    num_workers: 2
    pin_memory: true
    persistent_workers: true
    prefetch_factor: 2
  optimizer:
    learning_rate: 0.0006
    weight_decay: 0.1
  precision: bf16
  gradient_clip_norm: 1.0
  checkpoint_interval_steps: 1000
  log_interval_steps: 20
  evaluation:
    interval_steps: 1000
    evaluators:
      perplexity:
        split: validation
        maximum_documents: 200
      python_completion:
        tasks_path: tests/fixtures/python_completion/tasks.jsonl
        maximum_tasks: 10
        maximum_new_tokens: 96
        execution_timeout_seconds: 2.0
        stop_sequences:
          - "\n\ndef "
          - "\nclass "
          - "\nif __name__"

evaluation:
  perplexity:
    split: validation
    maximum_documents: 1000
  python_completion:
    tasks_path: tests/fixtures/python_completion/tasks.jsonl
    maximum_tasks: null
    maximum_new_tokens: 128
    execution_timeout_seconds: 2.0
    stop_sequences:
      - "\n\ndef "
      - "\nclass "
      - "\nif __name__"

inference:
  engine: kv_cache
  precision: bf16
  quantization: none
  decoding:
    strategy: greedy
  maximum_new_tokens: 128
  batch_size: 1
  stop_sequences:
    - "\n\ndef "
    - "\nclass "
    - "\nif __name__"
