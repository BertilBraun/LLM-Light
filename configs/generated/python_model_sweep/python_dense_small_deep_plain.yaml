experiment:
  name: python_dense_small_deep_plain
  seed: 1337
  output_dir: runs\python_dense_small_deep_plain
dataset:
  type: huggingface
  name: BertilBraun/TinyPython
  config_name: null
  text_column: null
  text_template: '{task_description}


    {code}

    '
  language_column: null
  languages: []
  license_column: null
  licenses: []
  streaming: true
  splits:
  - source_split: train
    split: validation
    skip_documents: 0
    max_documents: 1000
  - source_split: train
    split: test
    skip_documents: 1000
    max_documents: 1000
  - source_split: train
    split: train
    skip_documents: 2000
    max_documents: null
preprocessing:
  transforms:
  - type: normalize_unicode
    form: NFC
  - type: normalize_line_endings
  - type: min_length
    min_characters: 20
  - type: max_length
    max_characters: 4096
  - type: exact_deduplication
  output_shard_documents: 20000
  workers: 8
tokenizer:
  type: rust_byte_bpe
  vocabulary_size: 6000
  max_training_documents: 500000
  max_training_bytes: 250000000
  training_workers: 8
  add_bos_token: true
  add_eos_token: true
  add_pad_token: true
  additional_special_tokens: []
packing:
  context_length: 256
  add_bos: true
  add_eos: true
  pack_documents: true
  maximum_shard_tokens: 5000000
  workers: 8
  fill_in_middle:
    enabled: false
    probability: 0.0
    minimum_segment_characters: 8
    prefix_marker: <fim_prefix>
    suffix_marker: <fim_suffix>
    middle_marker: <fim_middle>
model:
  type: dense_gpt
  dimension: 88
  layers: 4
  attention_heads: 4
  feed_forward_dimension: 352
  dropout: 0.05
  tie_embeddings: true
training:
  objective: causal_language_modeling
  causal_language_modeling:
    auxiliary_loss_weight: 0.0
  maximum_steps: 1500
  batch_size_sequences: 512
  dataloader:
    num_workers: 4
    pin_memory: true
    persistent_workers: true
    prefetch_factor: 2
  optimizer:
    learning_rate: 0.001
    weight_decay: 0.1
    learning_rate_schedule:
      type: fixed
  precision: bf16
  gradient_clip_norm: 1.0
  checkpoint_interval_steps: 500
  max_checkpoints: 2
  log_interval_steps: 20
  evaluation:
    interval_steps: 500
    evaluators:
      exact_reproduction: null
      perplexity:
        split: validation
        maximum_documents: 200
      fixed_prompt_generation:
        prompts:
        - 'Given a list of integers, write a function that returns the sum of all
          even numbers in the list.

          '
        - 'Given a string, write a function that returns the string in reverse order.

          '
        - 'Given a list of strings, write a function that returns a new list containing
          only the strings that start with the letter ''A''.


          def filter_strings_starting_with_a(strings: list[str]) -> list[str]:'
        maximum_new_tokens: 160
      python_completion:
        tasks_path: tests\fixtures\tinypython_completion\tasks.jsonl
        maximum_tasks: null
        maximum_new_tokens: 160
        execution_timeout_seconds: 2.0
        stop_sequences: []
post_training:
  type: none
evaluation:
  exact_reproduction: null
  perplexity:
    split: validation
    maximum_documents: 1000
  fixed_prompt_generation: null
  python_completion:
    tasks_path: tests\fixtures\tinypython_completion\tasks.jsonl
    maximum_tasks: null
    maximum_new_tokens: 160
    execution_timeout_seconds: 2.0
    stop_sequences:
    - '


      Return '
    - '


      Given '
    - '


      Create '
export:
  bundle_path: export\bundle.zip
  include_tensorboard: true
  include_all_checkpoints: false
inference:
  engine: kv_cache
  precision: bf16
  quantization: none
  decoding:
    strategy: greedy
  maximum_new_tokens: 160
  batch_size: 1
  stop_sequences:
  - '


    Return '
  - '


    Given '
  - '


    Create '
distributed:
  enabled: true
  backend: nccl
  strategy: data_parallel
  world_size: 2
  simulated_nodes:
    count: 1
    processes_per_node: 2
  parallelism:
    data: 2
    tensor: 1
    pipeline: 1
    context: 1
    expert: 1
  checkpoint:
    type: sharded
    save_rank_local_state: true
