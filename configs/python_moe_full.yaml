experiment:
  name: python_moe_full
  seed: 1337
  output_dir: runs/python_moe_full

dataset:
  type: huggingface
  name: BertilBraun/TinyPython
  text_template: "{task_description}\n\n{code}\n"
  streaming: true
  splits:
    - source_split: train
      split: validation
      max_documents: 1000
    - source_split: train
      split: test
      skip_documents: 1000
      max_documents: 1000
    - source_split: train
      split: train
      skip_documents: 2000

tokenizer:
  type: rust_byte_bpe
  vocabulary_size: 6000
  max_training_documents: 500000
  max_training_bytes: 250000000
  training_workers: 8
  add_bos_token: true
  add_eos_token: true
  add_pad_token: true

preprocessing:
  workers: 8
  output_shard_documents: 20000
  transforms:
    - type: normalize_unicode
      form: NFC
    - type: normalize_line_endings
    - type: min_length
      min_characters: 20
    - type: max_length
      max_characters: 4096
    - type: exact_deduplication

packing:
  workers: 8
  context_length: 256
  add_bos: true
  add_eos: true
  pack_documents: true
  maximum_shard_tokens: 5000000

model:
  type: moe_gpt
  dimension: 320
  layers: 6
  attention_heads: 8
  expert_feed_forward_dimension: 1280
  expert_count: 4
  router_top_k: 1
  dropout: 0.05
  tie_embeddings: true

training:
  objective: causal_language_modeling
  causal_language_modeling:
    auxiliary_loss_weight: 0.01
  maximum_steps: 3750
  batch_size_sequences: 512
  dataloader:
    num_workers: 4
    pin_memory: true
    persistent_workers: true
    prefetch_factor: 2
  optimizer:
    learning_rate: 0.0015
    weight_decay: 0.1
  precision: bf16
  gradient_clip_norm: 1.0
  checkpoint_interval_steps: 500
  log_interval_steps: 20
  evaluation:
    interval_steps: 500
    evaluators:
      perplexity:
        split: validation
        maximum_documents: 200
      python_completion:
        tasks_path: tests/fixtures/tinypython_completion/tasks.jsonl
        maximum_new_tokens: 160
        execution_timeout_seconds: 2.0
        stop_sequences:
          - "\n\nReturn "
          - "\n\nGiven "
          - "\n\nCreate "

evaluation:
  perplexity:
    split: validation
    maximum_documents: 1000
  fixed_prompt_generation:
    prompts:
      - "def uppercase_reversed_nonempty(values: list[str]) -> list[str]:\n"
      - "def sum_enabled_amounts_by_category(records: list[dict[str, object]]) -> dict[str, int]:\n"
      - "def first_even_in_range(values: list[int], lower: int, upper: int) -> int | None:\n"
      - "def normalize_word_counts(words: list[str], stop_words: list[str]) -> dict[str, int]:\n"
    maximum_new_tokens: 160
  python_completion:
    tasks_path: tests/fixtures/tinypython_completion/tasks.jsonl
    maximum_new_tokens: 160
    execution_timeout_seconds: 2.0
    stop_sequences:
      - "\n\nReturn "
      - "\n\nGiven "
      - "\n\nCreate "

inference:
  engine: kv_cache
  precision: bf16
  quantization: none
  decoding:
    strategy: greedy
  maximum_new_tokens: 160
  batch_size: 1
  stop_sequences:
    - "\n\nReturn "
    - "\n\nGiven "
    - "\n\nCreate "

distributed:
  enabled: true
  backend: nccl
  strategy: data_parallel
  world_size: 2
  simulated_nodes:
    count: 1
    processes_per_node: 2
  parallelism:
    data: 2
    tensor: 1
    pipeline: 1
    context: 1
    expert: 1
  checkpoint:
    type: sharded
    save_rank_local_state: true
