experiment:
  name: direct_dpo_smoke
  seed: 1337
  output_dir: runs/direct_dpo_smoke

dataset:
  type: inline_text
  documents:
    - "axy\n"

tokenizer:
  type: character
  add_bos_token: true
  add_eos_token: true
  add_pad_token: true

preprocessing:
  output_shard_documents: 1000
  transforms:
    - type: normalize_line_endings

packing:
  context_length: 6
  add_bos: true
  add_eos: true
  pack_documents: false
  maximum_shard_tokens: 1024

model:
  type: dense_gpt
  dimension: 16
  layers: 1
  attention_heads: 2
  feed_forward_dimension: 32
  dropout: 0.0
  tie_embeddings: true

training:
  objective: causal_language_modeling
  maximum_steps: 3
  batch_size_sequences: 1
  dataloader:
    num_workers: 0
    pin_memory: false
    persistent_workers: false
    prefetch_factor: null
  optimizer:
    learning_rate: 0.01
    weight_decay: 0.0
  precision: fp32
  gradient_clip_norm: 1.0
  checkpoint_interval_steps: 1
  log_interval_steps: 1
  evaluation: null

post_training:
  type: direct_preference_optimization
  preference_dataset_path: tests/fixtures/dpo_preferences/simple_preferences.jsonl
  beta: 0.1
  maximum_steps: 5
  batch_size_pairs: 1

evaluation: {}

inference:
  maximum_new_tokens: 4
