experiment:
  name: verify_byte_bpe
  seed: 1337
  output_dir: runs/verify_byte_bpe

dataset:
  type: local_text
  paths:
    - tests/fixtures/local_text/hello_world.txt
  glob_patterns: []

tokenizer:
  type: byte_bpe
  vocabulary_size: 260
  max_training_documents: 1
  max_training_bytes: null
  add_bos_token: true
  add_eos_token: true
  add_pad_token: true

preprocessing:
  output_shard_documents: 1000
  transforms:
    - type: normalize_unicode
      form: NFC
    - type: normalize_line_endings
    - type: exact_deduplication

packing:
  context_length: 13
  add_bos: true
  add_eos: true
  pack_documents: false
  maximum_shard_tokens: 1024

model:
  type: dense_gpt
  dimension: 32
  layers: 2
  attention_heads: 2
  feed_forward_dimension: 32
  dropout: 0.0
  tie_embeddings: true

training:
  objective: causal_language_modeling
  maximum_steps: 60
  batch_size_sequences: 1
  dataloader:
    num_workers: 0
    pin_memory: false
    persistent_workers: false
    prefetch_factor: null
  optimizer:
    learning_rate: 0.05
    weight_decay: 0.0
  precision: fp32
  gradient_clip_norm: 1.0
  checkpoint_interval_steps: 10
  log_interval_steps: 5
  evaluation: null

evaluation:
  exact_reproduction:
    prompt: ""
    expected_completion: "hello world\n"

inference:
  maximum_new_tokens: 20
